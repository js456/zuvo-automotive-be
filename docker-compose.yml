version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: zuvo-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Devendra@123
      MYSQL_DATABASE: zuvo_automotive
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  zuvo-app:
    image: zuvocloud-automotive:latest
    container_name: zuvo-app
    ports:
      - "9080:9080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/zuvo_automotive
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Devendra@123
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
